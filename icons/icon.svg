<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Liseré neon (décoratif) -->
  <rect x="16" y="16" width="480" height="480" rx="80"
        fill="none" stroke="#00ffe1" stroke-width="3" opacity="0.18"/>

  <!-- Contrôleur stylisé -->
  <g filter="url(#glow)" transform="translate(256,230)">
    <!-- Corps -->
    <rect x="-130" y="-64" width="260" height="128" rx="44"
          fill="#0d1a2e" stroke="#00ffe1" stroke-width="4"/>

    <!-- Croix directionnelle gauche -->
    <rect x="-110" y="-14" width="52" height="28" rx="4" fill="#00ffe1" opacity="0.85"/>
    <rect x="-97"  y="-28" width="26" height="56" rx="4" fill="#00ffe1" opacity="0.85"/>

    <!-- Boutons action droite -->
    <circle cx="82"  cy="-18" r="12" fill="#ff2d78" opacity="0.9"/>
    <circle cx="106" cy="2"   r="12" fill="#ffe700" opacity="0.9"/>
    <circle cx="58"  cy="2"   r="12" fill="#00ffe1" opacity="0.9"/>
    <circle cx="82"  cy="22"  r="12" fill="#00ff88" opacity="0.9"/>

    <!-- Boutons centraux -->
    <rect x="-18" y="-10" width="16" height="20" rx="4" fill="#3a5070"/>
    <rect x="2"   y="-10" width="16" height="20" rx="4" fill="#3a5070"/>
  </g>

  <!-- Texte RV en bas -->
  <text x="256" y="430"
        font-family="'Courier New', Courier, monospace"
        font-size="72" font-weight="900"
        text-anchor="middle"
        fill="#00ffe1"
        opacity="0.9"
        letter-spacing="12"
        filter="url(#glow)">RETROVAULT</text>
</svg>
